<div class="games-sec__global-bg hidden-mobile" id="gamesGlobalBg"></div>

<section class="section games-sec" id="games-section">
  <div class="games-sec__inner container">

    <!-- Заголовок -->
    <div class="games-sec__title" data-aos="fade-in">
      <h2>Игры <span>Доступные игры на PlayStation в нашем клубе.</span></h2>
      <p>
        <a href="index.html" class="back__link">
          ← Вернуться на главную
        </a>
      </p>
    </div>

    <!-- Контейнер контента -->
    <div class="games-sec__container">

      <!-- Основная сцена (текст) -->

        <div class="games-sec__stage-overlay"></div>
        <div class="games-sec__stage-content hidden-mobile">
          <span class="games-sec__genre" id="gamesGenre"></span>
          <h3 class="games-sec__stage-title" id="gamesTitle"></h3>
          <p class="games-sec__stage-desc" id="gamesDesc"></p>
          <button class="button games-sec__cta" id="gamesCta">Забронировать стол</button>
        </div>
      </div>

      <!-- Swiper: карточки игр -->
      <div class="games-sec__list">
        <div class="swiper games-swiper" id="gamesSwiper">
          <div class="swiper-wrapper" id="gamesTrack">
            <!-- Слайды генерируются через JS -->
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
